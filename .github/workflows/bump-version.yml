name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the tag and the commit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A PAT is required (not the default GITHUB_TOKEN): pushes made with
          # GITHUB_TOKEN do NOT trigger other workflows (e.g. publish.yml's
          # tag trigger), which would otherwise silently skip the PyPI release.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Read current version
        id: current
        run: |
          VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml
        run: |
          NEW="${{ steps.next.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${NEW}\"/" pyproject.toml

      - name: Commit and tag
        id: tag
        run: |
          NEW_TAG="v${{ steps.next.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.next.outputs.version }}"
          git tag -a "$NEW_TAG" -m "$NEW_TAG"
          git push origin HEAD
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
